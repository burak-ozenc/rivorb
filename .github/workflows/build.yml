name: Build & Release Rivorb

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS
          - os: ubuntu-latest
            name: Linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ (matrix.os == 'macos-latest') && 120 || 60 }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout JUCE
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: refs/tags/8.0.4
          path: JUCE
          fetch-depth: 1

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libfreetype6-dev \
            libfontconfig1-dev libgl1-mesa-dev

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build
        run: cmake --build build --config Release -- -j4

      - name: Zip VST3 (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path "build\Rivorb_artefacts\Release\VST3\Rivorb.vst3" `
            -DestinationPath "Rivorb-Windows-VST3.zip"

      - name: Upload Windows VST3
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Rivorb-Windows-VST3
          path: Rivorb-Windows-VST3.zip

      - name: Zip VST3 (Mac & Linux)
        if: runner.os != 'Windows'
        run: |
          cd build/Rivorb_artefacts/Release/VST3
          zip -r Rivorb-${{ matrix.name }}-VST3.zip Rivorb.vst3

      - name: Upload VST3 (Mac & Linux)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Rivorb-${{ matrix.name }}-VST3
          path: build/Rivorb_artefacts/Release/VST3/Rivorb-${{ matrix.name }}-VST3.zip
          overwrite: true

      - name: Zip AU (Mac only)
        if: runner.os == 'macOS'
        run: |
          cd build/Rivorb_artefacts/Release/AU
          zip -r Rivorb-macOS-AU.zip Rivorb.component

      - name: Upload AU (Mac only)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Rivorb-macOS-AU
          path: build/Rivorb_artefacts/Release/AU/Rivorb-macOS-AU.zip
          overwrite: true

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true