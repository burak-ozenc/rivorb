name: Build & Release Rivorb

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS
          - os: ubuntu-latest
            name: Linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout JUCE
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.4          # ← bumped from 7.0.9, fixes macOS 15
          path: JUCE
          fetch-depth: 1

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      # Windows: activate MSVC environment so Ninja finds cl.exe not MinGW
      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libfreetype6-dev \
            libfontconfig1-dev libgl1-mesa-dev

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        run: iscc "installer/rivorb_installer.iss"

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Rivorb-Windows-Installer
          path: installer/output/*.exe

      - name: Upload VST3 (Mac & Linux)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Rivorb-${{ matrix.name }}-VST3
          path: build/Rivorb_artefacts/Release/VST3/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true